name: Version Bump

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  bump:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2
          token: ${{ secrets.PAT }}

      - name: Check if this push should be skipped
        id: check
        run: |
          # Skip if the commit was made by the bot (version bump or formula update)
          AUTHOR="$(git log -1 --format='%ae')"
          if [ "$AUTHOR" = "github-actions[bot]@users.noreply.github.com" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "Skipping: commit authored by github-actions[bot]"
          # Skip if VERSION was already changed in this push (manual bump)
          elif git diff HEAD~1 -- VERSION | grep -q '^[+-][0-9]'; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "Skipping: VERSION already changed in this push"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Increment patch version
        if: steps.check.outputs.skip == 'false'
        run: |
          VERSION="$(cat VERSION | tr -d '[:space:]')"
          IFS='.' read -r major minor patch <<< "$VERSION"
          patch=$((patch + 1))
          echo "$major.$minor.$patch" > VERSION
          echo "Bumped $VERSION → $major.$minor.$patch"

      - name: Commit and push
        if: steps.check.outputs.skip == 'false'
        run: |
          VERSION="$(cat VERSION | tr -d '[:space:]')"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add VERSION
          git commit -m "chore: bump version to $VERSION"
          git push origin HEAD:main
